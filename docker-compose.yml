version: '3.8'

services:
  whatsapp-bot:
    build: .
    container_name: whatsapp-bot
    restart: unless-stopped
    ports:
      - "3000:3000"

    # Environment variables (can be overridden by .env file)
    environment:
      - NODE_ENV=production
      - PORT=3000

    # Mount .env file for API keys and secrets
    env_file:
      - .env

    # CRITICAL: Volume mounts for data persistence
    # These ensure data survives container restarts/recreations
    volumes:
      # Database persistence (SQLite)
      - whatsapp-data:/app/data

      # Uploaded media files
      - whatsapp-uploads:/app/uploads

      # WhatsApp session authentication (QR login data)
      - whatsapp-auth:/app/.wwebjs_auth

      # WhatsApp cache
      - whatsapp-cache:/app/.wwebjs_cache

    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Named volumes for persistent storage
# These volumes persist even when containers are removed
volumes:
  whatsapp-data:
    driver: local
  whatsapp-uploads:
    driver: local
  whatsapp-auth:
    driver: local
  whatsapp-cache:
    driver: local
