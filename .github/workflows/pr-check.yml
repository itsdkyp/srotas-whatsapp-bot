name: PR Checks

on:
  pull_request:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  lint-and-build-ui:
    name: Typecheck & Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install root dependencies
        run: npm install
      - name: Install frontend dependencies
        run: cd frontend && npm install
      - name: Build Frontend
        run: npm run build:ui
      - name: Run Backend API Tests
        run: npm test

  build-docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-build-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Test Docker Build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: srotas-bot:pr-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Save Docker Image to Tarball
        run: docker save srotas-bot:pr-test -o srotas-bot-docker-image.tar
      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: srotas-bot-docker-image
          path: srotas-bot-docker-image.tar
          retention-days: 7

  build-windows:
    name: Windows Package Check
    runs-on: windows-latest
    needs: lint-and-build-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build Windows App
        # This will automatically run build:ui first, testing the full Windows pipeline
        run: npm run build:win
        env:
          CSC_LINK: ''
          CSC_KEY_PASSWORD: ''
      - name: Silent Install Windows .exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist/*.exe | Select-Object -First 1
          Write-Host "Installing $($exe.FullName)..."
          Start-Process -FilePath $exe.FullName -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 5
          Write-Host "Installation completed."
      - name: Verify Installed Windows .exe & Test Functionality
        shell: pwsh
        run: |
          $searchDirs = @(
            "$env:LOCALAPPDATA\Programs",
            "$env:ProgramFiles",
            "${env:ProgramFiles(x86)}",
            "$env:USERPROFILE\AppData\Local",
            "dist\win-unpacked"
          )
          $exeFile = $null
          foreach ($dir in $searchDirs) {
            if (Test-Path $dir) {
              $found = Get-ChildItem -Path $dir -Filter "*Srotas*.exe" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Name -notlike "*Setup*" } | Select-Object -First 1
              if (!$found) {
                $found = Get-ChildItem -Path $dir -Filter "*whatsapp*.exe" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Name -notlike "*Setup*" } | Select-Object -First 1
              }
              if ($found) {
                $exeFile = $found
                break
              }
            }
          }
          if (!$exeFile) {
            Write-Error "Executable not found in any standard installation or unpack directory."
            exit 1
          }
          Write-Host "Found installed executable: $($exeFile.FullName)"
          Write-Host "Starting installed app server: $($exeFile.FullName) --run-server"
          $env:PORT = "3005"
          $env:APP_USER_DATA_PATH = "$env:LOCALAPPDATA\SrotasWhatsAppBotData"
          $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
          $proc = Start-Process -FilePath $exeFile.FullName -ArgumentList "--run-server" -PassThru -RedirectStandardOutput "server-out.log" -RedirectStandardError "server-err.log"
          
          Write-Host "Waiting up to 60s for server on port 3005..."
          $ready = $false
          for ($i = 0; $i -lt 240; $i++) {
            Start-Sleep -Milliseconds 250
            try {
              $resp = Invoke-WebRequest -Uri "http://localhost:3005/api/settings" -UseBasicParsing
              if ($resp.StatusCode -eq 200) {
                $stopwatch.Stop()
                $ready = $true
                break
              }
            } catch {}
          }
          
          if (!$ready) {
            Write-Error "Installed application failed to respond on API within 60 seconds."
            if (Test-Path "server-out.log") { Write-Host "=== STDOUT LOG ==="; Get-Content "server-out.log" }
            if (Test-Path "server-err.log") { Write-Host "=== STDERR LOG ==="; Get-Content "server-err.log" }
            if ($proc -and !$proc.HasExited) { Stop-Process -Id $proc.Id -Force }
            exit 1
          }
          
          $startupTimeMs = $stopwatch.ElapsedMilliseconds
          Write-Host "Server started and ready in $startupTimeMs ms ($([Math]::Round($startupTimeMs/1000, 2)) s)!"
          
          # Measure idle memory consumption of process tree
          $procs = Get-Process | Where-Object { $_.ProcessName -like "*Srotas*" -or $_.Id -eq $proc.Id }
          $totalWsBytes = ($procs | Measure-Object WorkingSet64 -Sum).Sum
          $totalPrivateBytes = ($procs | Measure-Object PrivateMemorySize64 -Sum).Sum
          $memWsMB = [Math]::Round($totalWsBytes / 1MB, 2)
          $memPrivateMB = [Math]::Round($totalPrivateBytes / 1MB, 2)
          
          Write-Host "Idle Memory Consumption (Working Set): $memWsMB MB"
          Write-Host "Idle Memory Consumption (Private Memory): $memPrivateMB MB"

          Write-Host "Simulating Active WhatsApp Session Creation via API..."
          $headers = @{ "Content-Type" = "application/json" }
          $body = '{"name":"benchmark-session"}'
          try {
            Invoke-WebRequest -Uri "http://localhost:3005/api/sessions" -Method POST -Headers $headers -Body $body -UseBasicParsing | Out-Null
          } catch {
            Write-Host "Session creation responded: $_"
          }
          
          Write-Host "Waiting 12 seconds for active session engine (e.g. Baileys socket / Chromium headless browser) to initialize..."
          Start-Sleep -Seconds 12
          
          # Measure active memory consumption of entire process tree including spawned Chromium browsers
          $activeProcs = Get-Process | Where-Object { $_.ProcessName -like "*Srotas*" -or $_.ProcessName -like "*chrome*" -or $_.Id -eq $proc.Id }
          $activeWsBytes = ($activeProcs | Measure-Object WorkingSet64 -Sum).Sum
          $activePrivateBytes = ($activeProcs | Measure-Object PrivateMemorySize64 -Sum).Sum
          $activeWsMB = [Math]::Round($activeWsBytes / 1MB, 2)
          $activePrivateMB = [Math]::Round($activePrivateBytes / 1MB, 2)
          $diffWsMB = [Math]::Round($activeWsMB - $memWsMB, 2)
          $diffPrivateMB = [Math]::Round($activePrivateMB - $memPrivateMB, 2)
          
          Write-Host "Active Session Memory (Working Set): $activeWsMB MB (+$diffWsMB MB)"
          Write-Host "Active Session Memory (Private): $activePrivateMB MB (+$diffPrivateMB MB)"
          
          # Append benchmark metrics to GitHub Step Summary
          "### ⚡ Windows Installed .exe Performance Benchmark (Idle vs Active Session)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "| Metric | Idle Startup | Active Session (1 Account) | Change |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "| :--- | :--- | :--- | :--- |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "| **Working Set RAM** | **$memWsMB MB** | **$activeWsMB MB** | **+$diffWsMB MB** |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "| **Private Memory** | **$memPrivateMB MB** | **$activePrivateMB MB** | **+$diffPrivateMB MB** |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "| **Startup Time** | **$startupTimeMs ms** ($([Math]::Round($startupTimeMs/1000, 2))s) | N/A | N/A |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          
          Write-Host "Testing Dashboard / API Health Route..."
          $healthResp = Invoke-WebRequest -Uri "http://localhost:3005/api/settings" -UseBasicParsing
          if ($healthResp.StatusCode -ne 200) {
            Write-Error "Health check route returned status $($healthResp.StatusCode)"
            Stop-Process -Id $proc.Id -Force
            exit 1
          }
          
          Write-Host "All functionality tests passed against installed Windows .exe!"
          Get-Process | Where-Object { $_.ProcessName -like "*Srotas*" -or $_.ProcessName -like "*chrome*" -or $_.Id -eq $proc.Id } | Stop-Process -Force -ErrorAction SilentlyContinue
      - name: Upload Windows Installer (.exe) Artifact
        uses: actions/upload-artifact@v4
        with:
          name: srotas-bot-windows-installer
          path: dist/*.exe
          retention-days: 7

  build-mac:
    name: macOS Package Check
    runs-on: macos-latest
    needs: lint-and-build-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build macOS App
        # This will automatically run build:ui first, testing the full macOS pipeline
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload macOS Packages (.dmg / .pkg) Artifact
        uses: actions/upload-artifact@v4
        with:
          name: srotas-bot-macos-installer
          path: |
            dist/*.dmg
            dist/*.pkg
          retention-days: 7
