name: Docker Build & Push

on:
  push:
    branches:
      - main       # Rebuild :latest on every merge to main
    tags:
      - 'v*'       # Rebuild and version-tag on releases like v1.2.3
    # Note: paths filter cannot be combined with tags in GitHub Actions.
    # The branch + tag scope is already specific enough.
  workflow_dispatch: # Allow manual trigger from GitHub UI


jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build each platform natively on its own runner — RUNS IN PARALLEL
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    environment: docker-hub

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest          # Native AMD64 runner
          - platform: linux/arm64
            runner: ubuntu-24.04-arm       # Native ARM64 runner (no QEMU!)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: itsdkyp/whatsapp-bot

      # Build the image for this specific platform only.
      # Push by digest so we can merge both into one manifest later.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=itsdkyp/whatsapp-bot,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      # Save the digest so the merge job can reference it
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Merge both platform digests into a single multi-arch manifest
  # ─────────────────────────────────────────────────────────────────────────────
  merge:
    name: Merge & Push Manifest
    runs-on: ubuntu-latest
    environment: docker-hub
    needs: build        # Waits for BOTH build jobs to complete

    steps:
      - name: Download AMD64 digest
        uses: actions/download-artifact@v4
        with:
          name: digests-amd64
          path: /tmp/digests

      - name: Download ARM64 digest
        uses: actions/download-artifact@v4
        with:
          name: digests-arm64
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generate tags:
      #   main push  → :latest + :<short-sha>
      #   tag push   → :v1.2.3 + :1.2 + :latest
      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: itsdkyp/whatsapp-bot
          tags: |
            type=sha,prefix=,format=short,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Create and push the multi-arch manifest pointing to both digests
      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'itsdkyp/whatsapp-bot@sha256:%s ' *)

      - name: Inspect final image
        run: docker buildx imagetools inspect itsdkyp/whatsapp-bot:${{ steps.meta.outputs.version }}
