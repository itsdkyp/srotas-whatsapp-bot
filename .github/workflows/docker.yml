name: Docker Build & Push

on:
  push:
    branches:
      - main                # Push latest image on every merge to main
    tags:
      - 'v*'               # Push versioned image on tags like v1.2.3
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  docker:
    name: Build & Push Multi-Arch Image
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up QEMU for cross-platform emulation ───────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx ───────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to Docker Hub ───────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Generate image tags ────────────────────────────────────────────────
      # On tag push     → itsdkyp/whatsapp-bot:v1.2.3  +  :latest
      # On main push    → itsdkyp/whatsapp-bot:latest  +  :<short-sha>
      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: itsdkyp/whatsapp-bot
          tags: |
            # Branch push: tag with short commit SHA
            type=sha,prefix=,format=short,enable={{is_default_branch}}
            # Branch push: always tag latest on main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag push: use the git tag (e.g. v1.2.3)
            type=semver,pattern={{version}}
            # Tag push: also push major.minor tag (e.g. 1.2)
            type=semver,pattern={{major}}.{{minor}}

      # ── 6. Build & push multi-arch image ──────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Re-use BuildKit layer cache from GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
