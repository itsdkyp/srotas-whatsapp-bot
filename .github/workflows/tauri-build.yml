name: Build Tauri App (validation)

# Build-validation only for the parallel Tauri migration track — no GitHub
# Release publishing. main's Electron release pipeline (release.yml) is
# untouched and keeps shipping independently until this track reaches full
# real-hardware parity.
on:
  push:
    branches:
      - feat/tauri-migration
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # macOS Build — produces a .app bundle (no .dmg: electron-builder's
  # bundle_dmg.sh issue doesn't apply here, but Tauri's own dmg bundling step
  # was flaky in local testing, so validation is scoped to the .app itself)
  # ─────────────────────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:ui

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Stage sidecar (pinned Node runtime + server-app resources)
        run: node scripts/stage-tauri-sidecar.mjs

      - name: Smoke-test staged sidecar (catch ABI mismatches before packaging)
        run: node scripts/smoke-test-sidecar.mjs

      - name: Build Tauri app
        working-directory: src-tauri
        run: npx tauri build --bundles app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-mac-app
          path: src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows Build — produces an NSIS installer
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:ui

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Stage sidecar (pinned Node runtime + server-app resources)
        run: node scripts/stage-tauri-sidecar.mjs

      - name: Smoke-test staged sidecar (catch ABI mismatches before packaging)
        run: node scripts/smoke-test-sidecar.mjs

      - name: Build Tauri app
        working-directory: src-tauri
        run: npx tauri build --bundles nsis

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 5
