name: Build & Release Electron Apps

on:
  push:
    tags:
      - 'v*'               # Trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:        # Allow manual trigger from GitHub UI
    inputs:
      draft:
        description: 'Create as draft release?'
        required: false
        default: 'true'
        type: boolean

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # macOS Build — produces .dmg and .pkg
  # ─────────────────────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild
        env:
          # Electron version must match the electron in package.json
          npm_config_target: '40.6.0'
          npm_config_arch: x64
          npm_config_target_arch: x64
          npm_config_disturl: 'https://electronjs.org/headers'
          npm_config_runtime: electron
          npm_config_build_from_source: true

      - name: Build macOS (dmg + pkg)
        run: npm run build:mac
        env:
          # Skip code signing for unsigned open-source builds
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/*.dmg
            dist/*.pkg
          if-no-files-found: error
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows Build — produces .exe installer
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild
        env:
          npm_config_target: '40.6.0'
          npm_config_arch: x64
          npm_config_target_arch: x64
          npm_config_disturl: 'https://electronjs.org/headers'
          npm_config_runtime: electron
          npm_config_build_from_source: true

      - name: Build Windows (NSIS installer)
        run: npm run build:win
        env:
          # Skip code signing for unsigned builds
          CSC_LINK: ''
          CSC_KEY_PASSWORD: ''
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: error
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release and attach all built assets
  # Runs after BOTH platform builds succeed
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows]
    permissions:
      contents: write    # Required to create releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-assets

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Srotas WhatsApp Bot ${{ github.ref_name }}
          draft: ${{ github.event.inputs.draft || 'false' }}
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          files: release-assets/*
          body: |
            ## 📦 Downloads

            | Platform | File | Description |
            |----------|------|-------------|
            | 🍎 macOS | `*.dmg` | Drag-and-drop installer |
            | 🍎 macOS | `*.pkg` | Package installer |
            | 🪟 Windows | `*.exe` | NSIS setup wizard |

            ## 🚀 Getting Started
            See [docs/INSTALL.md](docs/INSTALL.md) for setup instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
