events {
    worker_connections 1024;
}

http {
    # Upstream definition for the WhatsApp bot
    upstream whatsapp_backend {
        server whatsapp-bot:3000;
    }

    server {
        listen 80;
        server_name whatsapp-bot.local;

        # Increase client body size for file uploads
        client_max_body_size 100M;

        # Logging
        access_log /var/log/nginx/whatsapp-bot-access.log;
        error_log /var/log/nginx/whatsapp-bot-error.log;

        # Main application
        location / {
            proxy_pass http://whatsapp_backend;
            proxy_http_version 1.1;

            # WebSocket support (for Socket.IO)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable caching for WebSocket
            proxy_cache_bypass $http_upgrade;

            # Timeouts for long-polling/WebSocket
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Health check endpoint
        location /health {
            access_log off;
            proxy_pass http://whatsapp_backend;
        }
    }
}
